spring.application.name=demo1-message-broker
server.port=8081

# RabbitMQ connection
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=admin
spring.rabbitmq.password=admin123

# Listener ack mode: AUTO – dùng AmqpRejectAndDontRequeueException cho DLQ routing
spring.rabbitmq.listener.simple.acknowledge-mode=auto

# Log level
logging.level.com.demo.broker=INFO
